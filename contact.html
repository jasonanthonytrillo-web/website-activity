<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jason Anthony Trillo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">JAT</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <section class="page-section">
            <h1>Get In Touch</h1>
            <p>If you have any questions or would like to collaborate, feel free to reach out using the form below.</p>
            
            <form class="contact-form">
                <input type="text" placeholder="Your Name" >
                <input type="email" placeholder="Your Email" >
                <textarea placeholder="Your Message" rows="6" ></textarea>
                <button type="button" class="btn">Send Message</button>
            </form>
            <p id="thank-you-message" style="display: none; color: green; margin-top: 10px;">Thank you for your message! We will get back to you shortly.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Jason Anthony Trillo. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
